<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emiles Font Tester Website</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Montserrat&family=Bungee&display=swap" rel="stylesheet">

    <style>
        body {
                display: flex;
                justify-content: center;
        }

        #title {
            font-size: 600%;
            font-family: Bungee;
            text-align: center;
            margin-bottom: 0;
            margin-top: 0;
            color: black;
        }

        #container {
            width: fit-content;
            height: 75vh;
            
        }

        #content {
            margin: auto;
            height: 100%;
            width: 100%;
            background-color: black;
            border-radius: 20px;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        @media (max-width: 690px) {
            #title {
                font-size: 350%;
            }
        }

        @media (max-width: 400px) {
            #title {
                font-size: 300%;
            }
            
            #container {
                width: 95%;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="title"><b>FONT TESTER</b></h1>
        <div id="content">
            <h2><b>Type Your Font Below</b></h2>
        </div>
    </div>
</body>
</html>
