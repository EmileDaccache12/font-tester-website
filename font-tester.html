<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emiles Font Tester Website</title>

    <style>
        #title {
            font-size: 600%;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-align: center;
            margin-bottom: 0;
            margin-top: 0;
        }

        #container {
            width: fit-content;
            height: 75vh;
            margin: auto;

        }

        #content {
            margin: auto;
            height: 100%;
            width: 100%;
            background-color: black;
            border-radius: 20px;
        }

        @media (max-width: 500px) {
            #title {
                font-size: 500%;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="title"><b>FONT TESTER</b></h1>
        <div id="content">

        </div>
    </div>
</body>
</html>
