<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emiles Font Tester Website</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Montserrat&family=Bungee&display=swap" rel="stylesheet">

    <style>
        body {
                display: flex;
                justify-content: center;
        }

        #title {
            font-size: 600%;
            font-family: Bungee;
            text-align: center;
            margin-bottom: 0;
            margin-top: 0;
            color: black;
        }

        #container {
            width: fit-content;
            height: 75vh;
        }

        #content {
            margin: auto;
            height: 100%;
            width: 100%;
            background-color: black;
            border-radius: 20px;
            color: white;
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        #userinput {
            font-size: x-large;
            background-color: white;
            color: black;
            border: none;
            border-radius: 14px;
            padding: 7px;
        }

        @media (max-width: 690px) {
            #title {
                font-size: 350%;
            }
        }

        @media (max-width: 400px) {
            #title {
                font-size: 300%;
            }
            
            #content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="title"><b>FONT TESTER</b></h1>
        <div id="content">
            <h2><b>Type a Font Below or<br>Choose From the Popular Fonts</b></h2>
            <br><br>
            
            <input type="text" id="userinput" list="fonts" placeholder="Ex: caveat">

            <datalist id="fonts">
                <option value="placeholder" disabled>Popular Fonts</option>
                <option value="Roboto">
                <option value="Open Sans">
                <option value="Montserrat">
                <option value="Bungee">
            </datalist>
        </div>
    </div>
</body>
</html>
